name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 这里就是你要的：显式调用 compile 和 jar:jar
      # 注意：必须先 compile，否则 target/classes 是空的，打出来的包也是空的
      - name: Build with Maven Jar Plugin
        run: mvn -B clean compile jar:jar --file pom.xml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Plugin-Jar
          path: target/*.jar
          if-no-files-found: error